name: Build and Release Windows EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean YumisPrinter.spec

      - name: Package artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path dist/YumisPrinter.exe -DestinationPath YumisPrinter-win64.zip -Force
          $hash = (Get-FileHash dist/YumisPrinter.exe -Algorithm SHA256).Hash.ToLower()
          "${hash}  YumisPrinter.exe" | Out-File -FilePath SHA256SUMS.txt -Encoding ascii

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: Yumis Printer ${{ github.ref_name }}
          body: |
            Release oficial do Yumis Printer para Windows.

            Arquivos inclusos:
            - YumisPrinter.exe (executavel pronto para uso)
            - YumisPrinter-win64.zip (pacote compactado)
            - SHA256SUMS.txt (checksum para verificacao de integridade)

            Uso rapido:
            1. Baixe YumisPrinter.exe diretamente na secao Assets.
            2. Execute o arquivo no computador host da impressora.
            3. Abra a interface e compartilhe as impressoras para a rede local.
          files: |
            dist/YumisPrinter.exe
            YumisPrinter-win64.zip
            SHA256SUMS.txt